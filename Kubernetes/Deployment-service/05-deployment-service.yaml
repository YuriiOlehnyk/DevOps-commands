---
apiViersion: apps/v1
kind: Deployment
metadata:
  name: my-deployment     # Name of the deployment
  namespace: work
  labels:
    app: nginx            # Labels of the deployment
    version: 1.27.5
    owner: Yurii
  spec:
  replicas: 3             # Number of desired pods (replicas) to be created by the deployment
  selector:               # Which PODS will be managed by this deployment (with these 3 labels)
    matchLabels:
      app: nginx         
      version: 1.27.5
      owner: Yurii
  template:               # ----------------------------------------------------Start of the POD template ------------------------------------------------------
    metadata:
      labels:
        app: nginx        #------------------------------------------------------------
        version: 1.27.5   # Service will select PODS with these labels
        owner: Yurii      #------------------------------------------------------------
    spec:
      containers:
        - name: nginx
          image: nginx:1.27.5
          ports:
            - containerPort: 80
          resources:
            requests:
              memory: "64Mi"
              cpu: "250m"
            limits:
              memory: "128Mi"
              cpu: "500m"
          livenessProbe:
            tcpSocket:
              port: 80
            initialDelaySeconds: 15
            periodSeconds: 10
          readinessProbe:
            tcpSocket:
              port: 80
            initialDelaySeconds: 15
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: my-service
  namespace: work
  labels:
    environment: production
    maintainer: YuriiOlekhnyk
  spec:
    selector:
      app: nginx          #---------------------------------------------------------------------------
      version: 1.27.5     # choose pods with these labels (app: nginx, version: 1.27.5, owner: Yurii)
      owner: Yurii        #---------------------------------------------------------------------------
    ports:
      - name      : listener
        protocol  : TCP
        port      : 80    # port of the LoadBalancer (the port that will be exposed outside the cluster)
        targetPort: 80    # port of the container in the POD (nginx containerPort: 80)
    type: LoadBalancer
